        <span class="navbar-toggler-icon"></span>

      <div class="collapse navbar-collapse" [class.show]="isMenuOpen()" id="navbarNav">
        <ul class="navbar-nav ms-auto font-weight-bold">
          <li class="nav-item">
            <a class="nav-link" routerLink="/nowa-umowa" routerLinkActive="active" (click)="isMenuOpen.set(false)">

            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/drafts" routerLinkActive="active" (click)="isMenuOpen.set(false)">

          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/umowy" routerLinkActive="active" (click)="isMenuOpen.set(false)">
              <i class="bi bi-file-earmark-check me-1"></i>Podpisane umowy
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/pracownicy" routerLinkActive="active" (click)="isMenuOpen.set(false)">
              <i class="bi bi-person-vcard me-1"></i>Pracownicy

          </li>
